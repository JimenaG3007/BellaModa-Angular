<article class="product-card group bg-white rounded-2xl overflow-hidden border border-border shadow-md hover:shadow-2xl transition-all duration-500 hover:-translate-y-2">
  <!-- Imagen -->
  <div class="overflow-hidden">
    <img [src]="product().imagen"
         [alt]="product().nombre"
         class="w-full h-80 object-cover transition-transform duration-700 group-hover:scale-110">
  </div>

  <!-- Info -->
  <div class="p-5 text-center">
    <h3 class="font-playfair text-lg text-text mb-2">{{ product().nombre }}</h3>
    <p class="text-text-muted text-lg font-light mb-4">S/{{ product().precio }}.00</p>

    <!-- Botón -->
    <button (click)="onAdd()"
            class="w-full bg-transparent border border-text text-text py-2.5 px-6 text-xs uppercase tracking-widest rounded-lg font-medium
                   hover:bg-primary hover:border-primary hover:text-white transition-all duration-300 active:scale-95">
      Añadir al carrito
    </button>

    <!-- Mensaje de agregado -->
    <p class="text-success text-sm mt-3 transition-opacity duration-300"
       [class.opacity-100]="showMessage()"
       [class.opacity-0]="!showMessage()">
      ✓ Agregado al carrito
    </p>
  </div>
</article>
